{% extends 'base.html' %}
{% block title %}工具 — IT Manager{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width: 960px;">
    <h3 class="mb-4"><i class="bi bi-wrench-adjustable me-2"></i>工具</h3>

    <div class="row g-3">
        <div class="col-md-6">
            <a href="{{ url_for('tools.mac_trace_form') }}" class="text-decoration-none">
                <div class="card h-100 border-0 shadow-sm tool-card">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-2">
                            <i class="bi bi-diagram-3 fs-3 text-primary me-3"></i>
                            <h5 class="mb-0">MAC 追蹤</h5>
                        </div>
                        <p class="text-muted small mb-0">
                            輸入 MAC，自動（或指定起點）於 switch 間追蹤到實際端點 port，
                            支援 Cisco / Aruba / Zyxel。
                        </p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
