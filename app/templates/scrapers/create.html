{% extends 'base.html' %}
{% block title %}新增爬蟲{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-plus-circle me-2 text-primary"></i>新增爬蟲</h2>
  <a href="{{ url_for('scrapers.index') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>返回
  </a>
</div>
<div class="row">
  <div class="col-md-8">
    <form method="post">
      {% include 'scrapers/_form.html' %}
      <div class="mt-3 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>建立爬蟲
        </button>
        <a href="{{ url_for('scrapers.index') }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
