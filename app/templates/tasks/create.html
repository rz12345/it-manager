{% extends 'base.html' %}
{% block title %}新增備份任務 — Config Manager{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width: 960px;">
    <div class="d-flex align-items-center mb-4">
        <h3 class="mb-0"><i class="bi bi-plus-square me-2"></i>新增備份任務</h3>
        <a href="{{ url_for('tasks.index') }}" class="btn btn-outline-secondary btn-sm ms-auto">
            <i class="bi bi-arrow-left"></i> 返回列表
        </a>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="post" novalidate>
                {% include 'tasks/_form.html' %}
                <hr class="my-4">
                <div class="d-flex">
                    <a href="{{ url_for('tasks.index') }}" class="btn btn-outline-secondary">取消</a>
                    {{ form.submit(class='btn btn-primary ms-auto') }}
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
