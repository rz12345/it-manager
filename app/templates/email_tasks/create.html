{% extends 'base.html' %}
{% block title %}新增任務{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-plus-circle me-2 text-primary"></i>新增任務</h2>
  <a href="{{ url_for('email_tasks.index') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>返回
  </a>
</div>
<div class="row">
  <div class="col-md-8">
    <form method="post" novalidate>
      {% include 'email_tasks/_form.html' %}
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>建立任務
        </button>
        <a href="{{ url_for('email_tasks.index') }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
